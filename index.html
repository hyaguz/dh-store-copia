<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DH STORE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>DH STORE</h1>
            <p>Coleção Brasil 2026</p>
        </div>
    </header>

    <main class="container">
        <div class="produtos-grid">
            <!-- Produto 1 - Camisa Amarela -->
            <div class="produto-card" onclick="mostrarDetalhes('produto1')">
                <div class="produto-imagem">
                    <img src="imagens/camisa-amarela.jpg" alt="Camisa Brasil 2026 Amarela">
                </div>
                <div class="produto-info">
                    <h3>Brasil 2026 - Amarela</h3>
                    <div class="preco-container-card">
                        <span class="preco-antigo-card">R$ 120,00</span>
                        <span class="preco">R$ 89,99</span>
                    </div>
                    <button class="btn-ver-mais">Ver Detalhes</button>
                </div>
            </div>

            <!-- Produto 2 - Camisa Azul -->
            <div class="produto-card" onclick="mostrarDetalhes('produto2')">
                <div class="produto-imagem">
                    <img src="imagens/camisa-azul.jpg" alt="Camisa Brasil 2026 Azul">
                </div>
                <div class="produto-info">
                    <h3>Brasil 2026 - Azul</h3>
                    <div class="preco-container-card">
                        <span class="preco-antigo-card">R$ 120,00</span>
                        <span class="preco">R$ 89,99</span>
                    </div>
                    <button class="btn-ver-mais">Ver Detalhes</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal de Detalhes do Produto -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="fechar" onclick="fecharModal()">&times;</span>
            
            <div class="modal-header">
                <img id="modal-imagem" src="" alt="">
            </div>
            
            <div class="modal-body">
                <h2 id="modal-titulo"></h2>
                <p id="modal-descricao"></p>
                
                <div class="tamanhos">
                    <h4>Tamanhos Disponíveis:</h4>
                    <div class="tamanhos-grid">
                        <button class="tamanho-btn">P</button>
                        <button class="tamanho-btn">M</button>
                        <button class="tamanho-btn">G</button>
                        <button class="tamanho-btn">GG</button>
                    </div>
                </div>
                
                <div class="preco-container">
                    <span class="preco-antigo-modal" id="modal-preco-antigo">R$ 120,00</span>
                    <span class="preco-atual" id="modal-preco">R$ 89,99</span>
                    <span class="parcelamento">em até 3x de R$ 30,00 sem juros</span>
                </div>
                
                <a id="whatsapp-link" href="#" target="_blank" class="btn-whatsapp">
                    <i class="fab fa-whatsapp"></i>
                    Comprar pelo WhatsApp
                </a>
            </div>
        </div>
    </div>

    <!-- Botão Flutuante do WhatsApp -->
    <a href="https://wa.me/5541987984450?text=Olá! Tenho interesse nos produtos da DH STORE!" 
       class="whatsapp-flutuante" 
       target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script src="script.js"></script>
</body>
</html>
